services:
  rushify:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rushify
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    # Optional future enhancement: external Redis for shared IPTV cache across replicas
